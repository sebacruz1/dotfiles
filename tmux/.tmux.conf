set -as terminal-features 'xterm*:clipboard,bpaste,RGB'
set -as terminal-features 'screen*:clipboard,bpaste,RGB'
set -as terminal-features 'tmux*:clipboard,bpaste,RGB'
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

set -g history-limit 20000
set -g mouse on
set -g focus-events on
set -s escape-time 0
set -g assume-paste-time 1
set -g set-clipboard on

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
setw -g automatic-rename on

setw -g mode-keys vi

unbind C-b
unbind s
unbind C-s
unbind r
unbind ,
unbind p
unbind o

set -g prefix C-a
bind C-a send-prefix

bind s choose-tree -Zs -O name

bind c new-window -c "#{pane_current_path}"
bind , command-prompt -I "rename-window "

bind-key -r O swap-window -d -t -1
bind-key -r P swap-window -d -t +1
bind-key -n C-o previous-window
bind-key -n C-p next-window
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind x kill-pane

is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' { if -F '#{pane_at_left}' '' 'select-pane -L' }
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' { if -F '#{pane_at_bottom}' '' 'select-pane -D' }
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' { if -F '#{pane_at_top}' '' 'select-pane -U' }
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' { if -F '#{pane_at_right}' '' 'select-pane -R' }

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

bind r source-file ~/.tmux.conf \; display "Configuración de tmux recargada"

set -g status-position bottom
set -g status-bg "#16161d"
set -g status-fg "#dcd7ba"

set -g status-interval 10
set -g status-justify centre

set -g status-left "#[fg=#957fb8]#S"

set -g status-right "#[fg=yellow]#(whoami) "
set -g window-status-current-format "#[fg=#dcd7ba,bg=#16161d,bold] #I:#W#{?window_zoomed_flag,*,}"

set -g window-status-format "#[fg=#727169] #I:#W#{?window_zoomed_flag,*,}"

set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'
set -g @continuum-restore 'on'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'mrjones2014/smart-splits.nvim'

run '~/.tmux/plugins/tpm/tpm'
